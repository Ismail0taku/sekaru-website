<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SEKARU — المملكة الرقمية</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080604;--panel:#140F0A;--panel-light:#1F1811;--gold:#E8C56A;--gold-dim:#A68B4E;--ember:#B84820;--brown:#7A4E28;--text:#E8DDD0;--dim:#A09080;--line:rgba(232,197,106,0.10)}
::selection{background:rgba(232,197,106,0.18);color:#E8DDD0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--panel-light);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:radial-gradient(ellipse at 50% 0,var(--panel) 0%,var(--bg) 70%);color:var(--text);min-height:100vh;line-height:1.7;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;font-family:inherit;border:none;border-radius:8px;padding:10px 24px;font-size:1rem;transition:all .4s ease;touch-action:manipulation}
input,select,textarea{font-family:inherit;background:var(--panel-light);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:10px 14px;font-size:1rem;width:100%;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(232,197,106,0.06)}
::placeholder{color:var(--dim)}a{color:var(--gold);text-decoration:none;cursor:pointer}

/* Entrance */
#entrance{position:fixed;inset:0;z-index:9999;overflow:hidden;background:#080604;display:flex;align-items:center;justify-content:center;transition:opacity .8s ease,transform 1s ease}
#entrance.hide{opacity:0;transform:scale(1.05);pointer-events:none}
.e-wrapper{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.e-flash{position:fixed;inset:0;z-index:10000;background:radial-gradient(circle at 50% 86vh,rgba(232,197,106,.8)0%,rgba(255,215,0,.35)12%,rgba(232,197,106,.1)30%,transparent 55%);opacity:0;pointer-events:none;transition:opacity .1s ease}
.e-flash.show{opacity:1}
.e-leaf{position:absolute;width:16px;height:36px;left:calc(50% - 8px);top:-40px;z-index:10;background:linear-gradient(135deg,#f5d76e,#E8C56A,#c9a84a);border-radius:100% 0 100% 0;box-shadow:0 0 30px rgba(232,197,106,.6),0 0 80px rgba(232,197,106,.2);opacity:0;transform:rotate(-35deg) scale(.6);pointer-events:none}
.e-leaf.falling{animation:eLeafFall 1.7s cubic-bezier(.35,.01,.25,1) forwards}
@keyframes eLeafFall{0%{opacity:0;transform:translateY(0)rotate(-35deg)scale(.6)}6%{opacity:1}12%{transform:translateY(10vh)rotate(-30deg)scale(.7)}20%{transform:translateY(19vh)rotate(-25deg)scale(.8)}30%{transform:translateY(30vh)rotate(-18deg)scale(.88)}40%{transform:translateY(41vh)rotate(-10deg)scale(.93)}50%{transform:translateY(50vh)rotate(-2deg)scale(.96)}60%{transform:translateY(59vh)rotate(6deg)scale(.95)}70%{transform:translateY(68vh)rotate(14deg)scale(.92)}80%{transform:translateY(75vh)rotate(12deg)scale(.88)}90%{transform:translateY(81vh)rotate(8deg)scale(.84);opacity:.9}100%{opacity:0;transform:translateY(86vh)rotate(5deg)scale(.8)}}
.e-burst{position:absolute;top:86vh;left:50%;transform:translate(-50%,-50%);z-index:11;pointer-events:none}
.e-bp{position:absolute;border-radius:50%;opacity:0;pointer-events:none}
.e-star-p{position:absolute;opacity:0;pointer-events:none}
.e-rays{position:absolute;top:86vh;left:50%;z-index:12;pointer-events:none}
.e-ray-item{position:absolute;width:2px;height:0;border-radius:2px;transform-origin:bottom center;opacity:0;pointer-events:none}
.e-ember{position:absolute;border-radius:50%;opacity:0;pointer-events:none;filter:blur(1.5px)}
.e-ring-wave{position:absolute;top:86vh;left:50%;z-index:11;pointer-events:none;border-radius:50%;transform:translate(-50%,-50%)}
@keyframes eShake{0%,100%{transform:translate(0,0)}8%{transform:translate(-7px,4px)}16%{transform:translate(6px,-6px)}24%{transform:translate(-4px,8px)}32%{transform:translate(8px,-3px)}40%{transform:translate(-6px,6px)}48%{transform:translate(5px,-7px)}56%{transform:translate(-3px,5px)}64%{transform:translate(7px,-4px)}72%{transform:translate(-5px,3px)}80%{transform:translate(4px,-5px)}88%{transform:translate(-2px,2px)}96%{transform:translate(3px,-2px)}}
.e-kingdom{position:absolute;inset:0;z-index:2;opacity:0;transition:opacity .9s ease;background:radial-gradient(1px 1px at 10% 12%,rgba(232,197,106,.4)0%,transparent 100%),radial-gradient(1.5px 1.5px at 30% 8%,rgba(232,197,106,.3)0%,transparent 100%),radial-gradient(1px 1px at 50% 15%,rgba(232,197,106,.35)0%,transparent 100%),radial-gradient(1px 1px at 70% 10%,rgba(232,197,106,.3)0%,transparent 100%),radial-gradient(1.5px 1.5px at 88% 18%,rgba(232,197,106,.4)0%,transparent 100%),radial-gradient(1px 1px at 20% 22%,rgba(232,197,106,.25)0%,transparent 100%),radial-gradient(1px 1px at 60% 25%,rgba(232,197,106,.2)0%,transparent 100%),radial-gradient(ellipse 60% 30% at 15% 100%,rgba(20,15,10,.97)30%,transparent 100%),radial-gradient(ellipse 80% 28% at 40% 100%,rgba(20,15,10,.95)35%,transparent 100%),radial-gradient(ellipse 70% 35% at 70% 100%,rgba(20,15,10,.97)30%,transparent 100%),radial-gradient(ellipse 40% 40% at 85% 100%,rgba(20,15,10,.93)25%,transparent 100%),radial-gradient(ellipse 50% 5% at 50% 100%,rgba(232,197,106,.12)0%,transparent 100%),radial-gradient(ellipse 30% 15% at 50% 88%,rgba(232,197,106,.03)0%,transparent 100%),radial-gradient(circle at 50% 86vh,rgba(232,197,106,.05)0%,transparent 55%),#080604}
.e-kingdom.show{opacity:1}
.e-logo-wrap{position:relative;z-index:5;text-align:center;opacity:0;transform:translateY(18px);transition:opacity .7s ease,transform .7s ease}
.e-logo-wrap.show{opacity:1;transform:translateY(0)}
.e-logo-text{font-size:clamp(2.5rem,7vw,4rem);font-weight:900;letter-spacing:clamp(4px,1vw,8px);background:linear-gradient(135deg,#E8C56A 10%,#ece0b8 35%,#E8C56A 55%,#E8C56A 100%);background-size:200% 200%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px rgba(232,197,106,.15))}
.e-logo-sub{color:#A68B4E;font-size:clamp(.8rem,1.5vw,1rem);letter-spacing:clamp(3px,.6vw,6px);margin-top:4px}
.e-skip{position:absolute;bottom:20px;z-index:20;color:rgba(166,139,78,.5);font-size:.7rem;border:1px solid rgba(166,139,78,.15);padding:6px 16px;border-radius:4px;background:transparent;cursor:pointer;transition:all .4s ease;opacity:0;animation:eFadeIn .5s ease 3.5s forwards}
.e-skip:hover{color:var(--gold);border-color:rgba(232,197,106,.3)}
@keyframes eFadeIn{to{opacity:1}}

/* Navbar */
.navbar{background:rgba(8,6,4,0.88);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:10px 24px;backdrop-filter:blur(16px)}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.nav-logo-img{width:36px;height:36px;border-radius:50%;object-fit:cover;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.1rem;color:var(--gold)}
.nav-logo-text{font-weight:800;font-size:1.2rem;color:var(--gold)}
.nav-links{display:flex;gap:4px;flex-wrap:wrap}
.nav-links button{background:transparent;color:var(--dim);padding:8px 18px;font-size:.85rem;border-radius:8px;white-space:nowrap;font-weight:600;transition:all .4s ease;position:relative}
.nav-links button:hover{color:var(--gold);background:rgba(232,197,106,0.06)}
.nav-links button.active{color:var(--gold);background:rgba(232,197,106,0.08)}
.nav-user{font-size:.85rem;color:var(--gold-dim);display:flex;align-items:center;gap:8px}
.nav-hamburger{display:none;background:transparent;border:1px solid var(--line);color:var(--gold);font-size:1.3rem;padding:8px 12px;border-radius:6px;cursor:pointer}
.nav-mobile{display:none;background:var(--panel);border-bottom:1px solid var(--line);padding:8px 16px;gap:4px;flex-direction:column}
.nav-mobile.show{display:flex}
.nav-mobile button{background:transparent;color:var(--dim);padding:12px 16px;font-size:.9rem;border-radius:6px;white-space:nowrap;font-weight:600;text-align:start;transition:all .4s ease}
.nav-mobile button:hover,.nav-mobile button.active{color:var(--gold);background:rgba(232,197,106,0.06)}
.edit-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(184,72,32,0.12);color:var(--ember);border:1px solid rgba(184,72,32,0.25);border-radius:4px;padding:2px 10px;font-size:.7rem;font-weight:700;animation:editPulse 2s ease infinite;margin-inline-start:8px}
@keyframes editPulse{0%,100%{opacity:.7}50%{opacity:1}}
[contenteditable=true]{outline:1px dashed rgba(232,197,106,0.2);cursor:text;border-radius:4px;padding:2px 4px;transition:outline .2s;min-height:1em}
[contenteditable=true]:focus{outline:1px dashed var(--gold);background:rgba(232,197,106,0.03)}

.container{max-width:1100px;margin:0 auto;padding:0 24px}
.page{display:none;padding:0}.page.active{display:block}

.hero{text-align:center;padding:60px 20px 40px}
.hero h1{font-size:clamp(1.8rem,5vw,2.8rem);color:var(--gold);margin-bottom:12px}
.hero p{color:var(--dim);font-size:1.05rem;max-width:500px;margin:0 auto 24px;line-height:1.8}
.hero-badge{display:inline-flex;align-items:center;gap:8px;font-size:.8rem;color:var(--gold-dim);border:1px solid var(--line);border-radius:20px;padding:6px 14px;margin-bottom:20px;background:rgba(232,197,106,0.03)}

.btn-gold{background:linear-gradient(135deg,var(--gold),#c9a84a);color:#0E0B08;font-weight:800;padding:12px 28px;border-radius:8px;font-size:1rem;display:inline-flex;align-items:center;gap:8px;box-shadow:0 2px 16px rgba(232,197,106,0.12)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 4px 24px rgba(232,197,106,0.18)}
.btn-outline{border:1px solid var(--line);color:var(--text);padding:10px 22px;border-radius:8px;font-size:.9rem;display:inline-flex;align-items:center;gap:8px;background:transparent}
.btn-outline:hover{border-color:var(--gold)}
.btn-sm{padding:8px 16px;font-size:.85rem}
.btn-primary{background:var(--gold);color:var(--bg);font-weight:700;width:100%;padding:12px;font-size:1rem;border-radius:6px}
.btn-primary:hover{background:var(--ember);color:var(--text)}

.sec{padding:40px 0}.sec-header{text-align:center;margin-bottom:28px}
.sec-title{font-weight:800;color:var(--gold);font-size:clamp(1.3rem,3vw,1.8rem);margin-top:6px}
.sec-overline{color:var(--ember);font-weight:700;font-size:.85rem}

.guild-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.guild-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px;cursor:pointer;transition:all .4s ease}
.guild-card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.guild-card-icon{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:10px}
.guild-card h3{font-weight:800;font-size:1.1rem;margin-bottom:6px}
.guild-card p{color:var(--dim);font-size:.85rem;line-height:1.6;margin-bottom:12px}
.guild-card-foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:12px;font-size:.85rem}

.about-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:28px;margin-bottom:24px;line-height:1.8;max-width:700px;margin:0 auto 24px}
.h-list{display:grid;gap:12px;max-width:600px;margin:0 auto}
.h-item{display:flex;align-items:center;gap:14px;padding:16px 20px;background:var(--panel);border:1px solid var(--line);border-radius:10px;border-inline-start:4px solid var(--gold)}
.h-icon{font-size:1.8rem;width:44px;text-align:center;flex-shrink:0}
.h-title{font-weight:800;font-size:.95rem}
.h-name{font-size:.8rem;color:var(--dim);margin-top:2px}

.ev-list{display:flex;flex-direction:column;gap:10px;max-width:600px;margin:0 auto}
.ev-item{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px 18px;display:flex;align-items:center;gap:14px}
.ev-date{background:var(--ember);color:var(--text);border-radius:4px;padding:6px 10px;text-align:center;min-width:56px;font-size:.7rem;font-weight:700;flex-shrink:0}
.ev-date .day{font-size:1.2rem;display:block}
.ev-info h4{font-size:.95rem}.ev-info p{color:var(--dim);font-size:.8rem}

.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
.step{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px;text-align:center}
.step-n{width:40px;height:40px;border-radius:50%;background:var(--gold);color:var(--bg);font-weight:900;font-size:1.1rem;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}

.gd{max-width:650px;margin:0 auto;padding:40px 20px}
.gd-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:36px 28px;text-align:center}
.gd-icon{width:70px;height:70px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 20px}

.acct-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:28px;max-width:420px;margin:0 auto}
.acct-card h2{color:var(--gold);text-align:center;margin-bottom:6px}
.acct-card .sub{text-align:center;color:var(--dim);margin-bottom:20px;font-size:.85rem}
.acct-split{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}.acct-split>.acct-card{flex:1;min-width:280px;max-width:420px;margin:0}.m-sr-item{padding:8px 0;border-bottom:1px solid var(--line);font-size:.85rem;display:flex;justify-content:space-between;gap:8px}
.ns-wrap{position:relative;display:inline-block;margin:0 6px}.ns-drop{position:absolute;top:100%;right:0;min-width:260px;max-height:300px;overflow-y:auto;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:6px;z-index:100;display:none}.ns-drop.show{display:block}.ns-drop .m-sr-item{cursor:pointer}.ns-drop .m-sr-item:hover{background:var(--panel-light)}
.fg{margin-bottom:14px}.fg label{display:block;margin-bottom:4px;font-size:.85rem;color:var(--dim)}
.fg .err{color:#e74c3c;font-size:.8rem;margin-top:4px}
.toggle-link{color:var(--gold);cursor:pointer}

.shop-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
.shop-item{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px 14px;text-align:center;display:flex;flex-direction:column}
.shop-item-icon{font-size:2.2rem;margin-bottom:6px}
.shop-item h3{font-weight:800;font-size:.95rem;margin-bottom:2px}
.shop-item p{color:var(--dim);font-size:.75rem;flex:1;margin-bottom:8px}.shop-item .price{font-size:.95rem;font-weight:700;color:var(--gold);margin-bottom:8px}

.admin-gate{max-width:340px;margin:60px auto;text-align:center}
.admin-sec{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:22px;margin-bottom:20px}
.admin-sec h3{color:var(--gold);font-weight:700;font-size:1rem;margin-bottom:12px}
.fr{display:flex;gap:10px;margin-bottom:10px;align-items:end}.fr>*{flex:1}
.admin-g-item,.arow{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--panel-light);border-radius:6px;margin-bottom:4px;font-size:.85rem}
.profile-info{display:grid;gap:8px;max-width:320px;margin:0 auto}
.profile-info-row{display:flex;justify-content:space-between;padding:8px 14px;background:var(--panel);border-radius:6px;border:1px solid var(--line);font-size:.85rem}

#toasts{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--panel-light);border:1px solid var(--gold);color:var(--text);padding:10px 18px;border-radius:6px;font-size:.85rem;animation:si .4s ease;max-width:340px}
@keyframes si{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}

footer{text-align:center;padding:24px 20px;color:var(--dim);font-size:.82rem;border-top:1px solid var(--line);margin-top:40px}

.avatar-upload{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:16px}
.avatar-img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gold)}
.avatar-placeholder{width:80px;height:80px;border-radius:50%;background:var(--ember);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:var(--text)}

@media(max-width:700px){
  .nav-links{display:none !important}
  .nav-hamburger{display:block}
  .nav-user{margin-inline-start:auto}
  .guild-grid,.shop-grid{grid-template-columns:1fr}
  .steps{grid-template-columns:1fr}.fr{flex-direction:column}
  .container{padding:0 16px}
  .navbar{padding:8px 12px}
  .hero{padding:32px 12px 24px}
  .hero p{font-size:.95rem}
  .sec{padding:24px 0}
  .about-card{padding:18px}
  .guild-card,.admin-sec{padding:14px}
  .gd{padding:20px 12px}
  .gd-card{padding:24px 16px}
  .acct-card{padding:20px}
  .shop-item{padding:14px 10px}
  .admin-g-item,.arow{flex-direction:column;align-items:start;gap:8px}
  .admin-g-item>div:last-child,.arow>div:last-child{width:100%;justify-content:flex-start;flex-wrap:wrap}
  #toasts{right:10px;bottom:10px;left:10px}
  .toast{max-width:100%;font-size:.8rem;padding:8px 14px}
  .e-leaf{width:12px;height:28px}
  .nav-mobile button{padding:10px 14px;font-size:.85rem}
  .ev-list{gap:8px}
  .ev-item{padding:10px 12px;gap:10px}
  .ev-date{min-width:48px;padding:4px 8px}
  .ev-date .day{font-size:1rem}
  .h-item{padding:12px 14px;gap:10px}
  .h-icon{font-size:1.4rem;width:36px}
  .profile-info-row{flex-direction:column;gap:6px;align-items:center;text-align:center}
  .shop-item-icon{font-size:1.8rem}
  .admin-gate{padding:0 12px}
  .admin-gate>div{padding:20px 16px}
}
</style>
</head>
<body>

<div id="entrance"></div>

<nav class="navbar">
  <div class="nav-logo" id="navLogo"></div>
  <button class="nav-hamburger" id="navHam" onclick="toggleNav()" aria-label="القائمة">☰</button>
  <div class="nav-links" id="navLinks"></div>
  <div class="nav-user" id="navUser"></div>
</nav>
<div class="nav-mobile" id="navMobile"></div>

<div class="container" id="main"></div>
<div id="toasts"></div>
<footer>SEKARU — مملكة رقمية عربية</footer>

<script>
window.onerror=function(m,u,l,c,e){const d=document.createElement('div');d.style.cssText='position:fixed;bottom:0;left:0;right:0;z-index:99999;background:#1C1308;color:#E8714A;padding:20px;text-align:center;font-size:1rem;border-top:2px solid #E8714A;max-height:200px;overflow:auto';d.innerHTML='<strong>⚠️ خطأ:</strong> '+m+(e&&e.stack?'<br><span style="font-size:.75rem;color:var(--dim);direction:ltr;display:block;margin-top:8px">'+e.stack.slice(0,500)+'</span>':'');document.body.appendChild(d);console.error('SEKARU:',m,e)};
// ===== API =====
const API = window.location.origin + '/api'
function getToken(){try{return localStorage.getItem('sk_token')||''}catch{return ''}}
function getMaster(){try{return localStorage.getItem('sk_master')==='1'}catch{return false}}
function setToken(t){try{localStorage.setItem('sk_token',t)}catch{}}
function setMaster(v){try{localStorage.setItem('sk_master',v?'1':'0')}catch{}}
function clearToken(){try{localStorage.removeItem('sk_token');localStorage.removeItem('sk_master')}catch{}}
async function api(path, opts){
  const h={'Content-Type':'application/json'};const t=getToken()
  if(t)h['Authorization']='Bearer '+t
  const r=await fetch(API+path,{...opts,headers:{...h,...opts?.headers}})
  if(r.status===401){clearToken();S.member=null;S.master=false}
  if(!r.ok){const e=await r.json().catch(()=>({error:r.statusText}));throw new Error(e.error||'Request failed')}
  return r.json()
}
async function apiForm(path,fd){
  const h={};const t=getToken()
  if(t)h['Authorization']='Bearer '+t
  const r=await fetch(API+path,{method:'POST',headers:h,body:fd})
  if(r.status===401){clearToken();S.member=null;S.master=false}
  if(!r.ok){const e=await r.json().catch(()=>({error:r.statusText}));throw new Error(e.error||'Upload failed')}
  return r.json()
}

// ===== STATE =====
const S={page:'home',guilds:[],members:[],ranks:[],hier:[],shop:[],events:[],textEdits:{},logo:'',founderId:null,member:null,master:false}
let editMode=false
let aAuth=false
let navOpen=false
let S_loaded=false

// ===== HELPERS =====
function toast(msg){const c=document.getElementById('toasts');const e=document.createElement('div');e.className='toast';e.textContent=msg;c.appendChild(e);setTimeout(()=>e.remove(),3500)}
function $(id){return document.getElementById(id)}
function show(id){const e=$(id);if(e)e.classList.add('active')}
function hide(id){const e=$(id);if(e)e.classList.remove('active')}
function empty(id){const e=$(id);if(e)e.innerHTML=''}
function bs(v){return v?'active':''}
function toggleNav(){const m=$('navMobile');if(!m)return;navOpen=!navOpen;m.classList.toggle('show',navOpen)}

// ===== DATA LOADING =====
async function loadAll(){
  try{
    const [guilds,members,ranks,hier,shop,events,edits,logoRes,founderRes]=await Promise.all([
      api('/guilds'),api('/members'),api('/ranks'),api('/hierarchy'),
      api('/shop'),api('/events'),api('/text-edits'),
      api('/settings/logo'),api('/settings/founder_id')
    ])
    // Detect if the server returned seed data (cold start)
    const isSeed=guilds.length===4&&guilds.every(g=>'agms'.includes(g.id))
    const hasCache=!!(S.guilds&&S.guilds.length)
    S.guilds=(!isSeed&&guilds.length)?guilds:(hasCache?S.guilds:DG)
    S.members=members.length?members:(S.members||[])
    S.ranks=ranks.length?ranks:(S.ranks||DR)
    S.hier=hier.length?hier:(S.hier||DC)
    S.shop=shop.length?shop:(S.shop||[])
    S.events=events.length?events:(S.events||DE)
    S.textEdits=Object.keys(edits||{}).length?edits:(S.textEdits||{})
    S.logo=logoRes.value||(S.logo||'')
    S.founderId=founderRes.value||(S.founderId||null)
    // Cache to localStorage (only if not seed data)
    if(!isSeed)try{localStorage.setItem('sk_cache',JSON.stringify({guilds:S.guilds,members:S.members,ranks:S.ranks,hier:S.hier,shop:S.shop,events:S.events,edits:S.textEdits,logo:S.logo,founder:S.founderId,_ts:Date.now()}))}catch{}
    // Refresh session
    const tok=getToken()
    S.master=getMaster()
    if(tok&&!S.master){
      try{
        const me=await api('/auth/me')
        S.member=me
      }catch{S.member=null}
    }else if(S.master){S.member=null}
  }catch(e){
    // Fallback to localStorage cache
    try{
      const c=JSON.parse(localStorage.getItem('sk_cache'))
      if(c){
        S.guilds=c.guilds||DG;S.members=c.members||[];S.ranks=c.ranks||DR
        S.hier=c.hier||DC;S.shop=c.shop||[];S.events=c.events||DE
        S.textEdits=c.edits||{};S.logo=c.logo||'';S.founderId=c.founder||null
      }
    }catch{}
    toast('⚠️ فشل تحميل البيانات: '+e.message)
  }
  S.events=S.events.map(e=>({...e,description:e.description||e.desc||''}))
  S_loaded=true
}

// ===== RENDER =====
function render(){
  rNav()
  const mc=$('main');if(!mc)return
  const p=S.page
  if(p==='home'||p==='guilds') rHome(mc)
  else if(p==='guild') rGuild(mc)
  else if(p==='about'){ rHome(mc); setTimeout(()=>{const el=$('about-section');if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},50) }
  else if(p==='account') rAccount(mc)
  else if(p==='profile') rProfile(mc)
  else if(p==='shop') rShop(mc)
  else if(p==='bank') rBank(mc)
  else if(p==='admin') rAdmin(mc)
  else rHome(mc)
  if(editMode&&p!=='admin'){applyEdits(mc);setupEditable(mc)}
  window.scrollTo({top:0,behavior:'smooth'})
}

function go(p){S.page=p;render();if(navOpen)toggleNav()}
function ghome(){go('home')}

  const flt=S.members.filter(mm=>mm.nickname.toLowerCase().includes(q.toLowerCase())||(mm.phone||'').includes(q)).slice(0,15)

async function reg(){
  const n=$('rN')?.value?.trim(),p=$('rP')?.value,g=$('rG')?.value,ph=$('rPh')?.value?.trim(),msg=$('aMsg')
  if(!n||!p||!g||!ph){msg.innerHTML='<div class="err">يرجى تعبئة جميع الحقول</div>';return}
  try{
    const r=await api('/auth/register',{method:'POST',body:JSON.stringify({nickname:n,password:p,guildId:g,phone:ph})})
    setToken(r.token);S.member=r.user;toast('مرحباً بك يا '+n+'!');go('home')
  }catch(err){msg.innerHTML='<div class="err">'+err.message+'</div>'}
}

async function login(){
  const n=$('lN')?.value?.trim(),p=$('lP')?.value,msg=$('aMsg')
  if(!n||!p){msg.innerHTML='<div class="err">يرجى إدخال اللقب وكلمة السر</div>';return}
  try{
    const r=await api('/auth/login',{method:'POST',body:JSON.stringify({nickname:n,password:p})})
    setToken(r.token);S.member=r.user;toast('أهلاً بعودتك يا '+r.user.nickname+'!');go('home')
  }catch(err){msg.innerHTML='<div class="err">'+err.message+'</div>'}
}

async function uploadAvatar(input){
  const f=input.files[0];if(!f)return
  const fd=new FormData();fd.append('avatar',f)
  try{
    const r=await apiForm('/upload/avatar',fd)
    S.member.avatar=r.url
    await loadAll()
    toast('✅ تم تغيير الصورة')
    if(S.page==='profile')rProfile($('main'))
  }catch(err){toast('⚠️ فشل رفع الصورة: '+err.message)}
}
async function changePw(){
  const old=$('cpOld')?.value,pw=$('cpNew')?.value
  if(!old||!pw){toast('أدخل كلمة السر القديمة والجديدة');return}
  try{
    await api('/auth/change-password',{method:'POST',body:JSON.stringify({oldPassword:old,newPassword:pw})})
    $('cpOld').value='';$('cpNew').value='';toast('✅ تم تغيير كلمة السر')
  }catch(err){toast('⚠️ '+err.message)}
}

// ===== SHOP =====
function oi(m,id){return m&&(m.inventory||[]).some(i=>i.id===id)}
function rShop(mc){
  const si=S.shop,m=S.member
  function ri(items){return items.map(item=>{const owned=oi(m,item.id),can=m&&(m.coins||0)>=item.price&&!owned;return'<div class="shop-item"><div class="shop-item-icon">'+item.icon+'</div><h3>'+item.name+'</h3><p>'+item.description+'</p><div class="price">🪙 '+item.price+'</div>'+(owned?'<div style="padding:8px;border-radius:8px;background:rgba(244,201,93,0.1);color:var(--gold);font-size:.8rem;font-weight:700">✅ مملوك</div>':'<button class="btn-gold btn-sm" style="opacity:'+(can?1:.4)+';justify-content:center;width:100%" '+(can?'onclick="buyItem(\''+item.id+'\')"':'')+' '+(m?'':'title="سجّل أولاً"')+'>🛒 '+(m?can?'شراء':'رصيد غير كاف':'سجّل أولاً')+'</button>')+'</div>'}).join('')}
  mc.innerHTML=`<div class="sec"><div class="sec-header"><div class="sec-overline">🛍️ المتجر</div><h2 class="sec-title" data-ed="shop-title">اشتري مميزات حصرية</h2>${m?'<div style="display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--gold),#d9a83e);color:#1A1304;padding:6px 16px;border-radius:20px;font-weight:800;font-size:.95rem;margin-top:10px">🪙 رصيدك: '+(m.coins||0).toLocaleString('ar')+'</div>':''}</div>${!m?'<p style="text-align:center;color:var(--gold-dim);font-size:.85rem;margin-bottom:20px">سجّل دخولك للشراء</p>':''}<div class="shop-grid">${ri(si)}</div></div>`
}
async function buyItem(id){
  if(!S.member)return
  try{
    const r=await api('/shop/buy',{method:'POST',body:JSON.stringify({itemId:id})})
    S.member.coins=r.coins
    if(!S.member.inventory)S.member.inventory=[]
    S.member.inventory.push({id})
    toast('✅ تم الشراء');rNav();rShop($('main'))
  }catch(err){toast('⚠️ '+err.message)}
}

async function aLogin(){
  const p=$('aPw')?.value,eh=$('aErr')
  if(!p){if(eh)eh.textContent='أدخل كلمة سر الإدارة';return}
  try{
    const r=await api('/auth/master',{method:'POST',body:JSON.stringify({password:p})})
    setToken(r.token);setMaster(true);S.master=true;S.member=null;aAuth=true;go('admin');toast('✅ مرحباً بك في لوحة التحكم')
  }catch(err){if(eh)eh.textContent='كلمة السر غير صحيحة'}
}
async function aMemberLogin(){
  const n=$('aAdmN')?.value?.trim(),p=$('aAdmP')?.value,eh=$('aErr')
  if(!n||!p){if(eh)eh.textContent='أدخل اللقب وكلمة السر';return}
  try{
    const r=await api('/auth/login',{method:'POST',body:JSON.stringify({nickname:n,password:p})})
    S.member=r.user;S.master=false;setMaster(false);setToken(r.token)
    const rnk=S.ranks.find(x=>x.id===r.user.rank_id)

}

  toast(editMode?'✏️ وضع التعديل نشط — انقر على أي نص لتحريره':'تم إيقاف التعديل')
  if(S.page==='admin')rAdmin($('main'));else render()

function applyEdits(container){
  if(!container)return
  container.querySelectorAll('[data-ed]').forEach(el=>{
    const k=el.dataset.ed
    if(S.textEdits[k]&&el.textContent!==S.textEdits[k])el.textContent=S.textEdits[k]
  })
}
function setupEditable(container){
  if(!container||!editMode)return
  container.querySelectorAll('[data-ed]').forEach(el=>{
    el.contentEditable=true
    el.addEventListener('blur',function(){
      const k=this.dataset.ed
      if(this.textContent!==(S.textEdits[k]||'')){
        S.textEdits[k]=this.textContent
        api('/text-edits',{method:'PUT',body:JSON.stringify({key:k,value:this.textContent})}).catch(()=>{})
      }
    },{once:false})
  })
}

function buildEntrance(){
  const e=$('entrance');if(!e)return;e.innerHTML=''
  const w=document.createElement('div');w.className='e-wrapper';e.appendChild(w)
  const flash=document.createElement('div');flash.className='e-flash';document.body.appendChild(flash)
  const leaf=document.createElement('div');leaf.className='e-leaf';w.appendChild(leaf)

      setTimeout(()=>{ray.style.opacity='0'},550)

        sp.style.opacity='.9'

        requestAnimationFrame(()=>{em.style.transition=`all ${1+Math.random()*1.5}s ease-out`;em.style.transform=`translate(${x}px,${y}px)`;em.style.opacity='.5'})

      }

  setTimeout(()=>kd.classList.add('show'),2100)
